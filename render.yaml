# render.yaml - Render Blueprint
services:
  # ============================================
  # BACKEND API SERVICE
  # ============================================
  - type: web
    name: mentanova
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: oregon
    healthCheckPath: /api/v1/health
    envVars:
      # Application
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PORT
        value: "8000"
      
      # Database (use Render's managed PostgreSQL)
      - key: DATABASE_URL
        fromDatabase:
          name: novera_db
          property: connectionString
        # IMPORTANT: Replace postgresql:// with postgresql+asyncpg://
        # You may need to set this manually in Render dashboard
      
      - key: POSTGRES_HOST
        fromDatabase:
          name: novera_db
          property: host
      - key: POSTGRES_USER
        fromDatabase:
          name: novera_db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: novera_db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: mentanova-db
          property: database
      - key: POSTGRES_PORT
        value: "5432"
      
      # Redis (use Render's managed Redis)
      - key: REDIS_URL
        fromService:
          name: mentanova-redis
          type: redis
          property: connectionString
      
      # CORS - IMPORTANT: Add your Render URL
      - key: CORS_ORIGINS
        value: "https://mentanova-4zfe.onrender.com,http://localhost:5173,http://localhost:3000"
      
      - key: FRONTEND_URL
        value: "https://mentanova-4zfe.onrender.com"
      
      # Secrets (set these in Render Dashboard > Environment)
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      
      # SMTP (set in dashboard)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false

  # ============================================
  # DATABASE
  # ============================================
databases:
  - name: novera_db
    plan: starter
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []
